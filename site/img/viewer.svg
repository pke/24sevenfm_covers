<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 680" font-family="system-ui, 'Segoe UI', sans-serif">
  <defs>
    <!-- Original classical-album artwork (Adagio.FM vibe), invented recording -->
    <linearGradient id="vcover" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1c2a24"/>
      <stop offset=".6" stop-color="#0f3d33"/>
      <stop offset="1" stop-color="#081712"/>
    </linearGradient>
    <radialGradient id="vlight" cx=".35" cy=".28" r=".75">
      <stop offset="0" stop-color="#e9c46a" stop-opacity=".8"/>
      <stop offset=".5" stop-color="#e9c46a" stop-opacity=".18"/>
      <stop offset="1" stop-color="#e9c46a" stop-opacity="0"/>
    </radialGradient>
    <filter id="vblur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="42"/>
    </filter>
    <filter id="vshadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="14" stdDeviation="22" flood-color="#000" flood-opacity=".55"/>
    </filter>
    <clipPath id="vframe"><rect width="1100" height="680"/></clipPath>
    <clipPath id="vcoverClip"><rect x="90" y="115" width="450" height="450" rx="14"/></clipPath>
    <g id="vart">
      <rect width="450" height="450" fill="url(#vcover)"/>
      <rect width="450" height="450" fill="url(#vlight)"/>
      <!-- stylised cello silhouette curves -->
      <path d="M 250 120 C 200 170 210 220 250 250 C 290 280 290 340 245 375 C 215 398 205 420 218 445"
            fill="none" stroke="#e9c46a" stroke-width="7" stroke-linecap="round" opacity=".9"/>
      <path d="M 300 105 C 260 160 268 215 305 248 C 340 280 338 345 300 382"
            fill="none" stroke="#e9c46a" stroke-width="3.5" stroke-linecap="round" opacity=".45"/>
      <text x="36" y="72" fill="#f2e6c8" font-size="34" letter-spacing="3" font-family="Georgia, 'Times New Roman', serif" font-style="italic">Evening Adagio</text>
      <text x="38" y="100" fill="#b7ab8a" font-size="15" letter-spacing="2.5">THE HALLENBERG CHAMBER ORCHESTRA</text>
    </g>
  </defs>

  <!-- Backdrop: the cover, scaled up and softly blurred, under a dark scrim -->
  <g clip-path="url(#vframe)">
    <g transform="translate(-260,-500) scale(3.2)" filter="url(#vblur)"><use href="#vart"/></g>
    <rect width="1100" height="680" fill="#0b0d12" opacity=".45"/>
  </g>

  <!-- Sharp cover, left -->
  <g filter="url(#vshadow)"><rect x="90" y="115" width="450" height="450" rx="14" fill="#081712"/></g>
  <g clip-path="url(#vcoverClip)"><use href="#vart" x="90" y="115"/></g>

  <!-- Info box, right -->
  <rect x="600" y="205" width="410" height="270" rx="18" fill="#0b0d12" opacity=".72"/>
  <text x="640" y="278" fill="#e8eaf2" font-size="30" font-weight="700">Evening Adagio</text>
  <text x="640" y="312" fill="#e8eaf2" font-size="21" opacity=".92">Second Movement</text>
  <text x="640" y="348" fill="#9aa1b5" font-size="16">Helena Vasquez (6:42)</text>
  <text x="640" y="437" fill="#e8eaf2" font-size="44" font-weight="600" font-family="Consolas, ui-monospace, monospace">5:07</text>
</svg>
