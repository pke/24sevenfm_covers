<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 680" font-family="system-ui, 'Segoe UI', sans-serif">
  <defs>
    <!-- Fake cover art: an original sci-fi-score look (no real album referenced) -->
    <linearGradient id="cover" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1b2650"/>
      <stop offset=".55" stop-color="#3b2a6e"/>
      <stop offset="1" stop-color="#0c1022"/>
    </linearGradient>
    <radialGradient id="nebula" cx=".68" cy=".3" r=".8">
      <stop offset="0" stop-color="#ff5c9d" stop-opacity=".85"/>
      <stop offset=".45" stop-color="#7c5cff" stop-opacity=".5"/>
      <stop offset="1" stop-color="#7c5cff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="planet" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#e8eaf2"/>
      <stop offset="1" stop-color="#4d5f9e"/>
    </linearGradient>
    <filter id="blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="42"/>
    </filter>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="14" stdDeviation="22" flood-color="#000" flood-opacity=".55"/>
    </filter>
    <clipPath id="frame"><rect width="1100" height="680" rx="0"/></clipPath>
    <clipPath id="coverClip"><rect x="90" y="115" width="450" height="450" rx="14"/></clipPath>
    <g id="art">
      <rect width="450" height="450" fill="url(#cover)"/>
      <rect width="450" height="450" fill="url(#nebula)"/>
      <circle cx="300" cy="160" r="70" fill="url(#planet)"/>
      <ellipse cx="300" cy="160" rx="118" ry="26" fill="none" stroke="#e8eaf2" stroke-opacity=".7" stroke-width="5" transform="rotate(-18 300 160)"/>
      <circle cx="88" cy="330" r="2.2" fill="#fff" opacity=".9"/><circle cx="150" cy="60" r="1.6" fill="#fff" opacity=".7"/>
      <circle cx="45" cy="120" r="1.8" fill="#fff" opacity=".8"/><circle cx="390" cy="330" r="1.7" fill="#fff" opacity=".8"/>
      <circle cx="215" cy="255" r="1.4" fill="#fff" opacity=".6"/><circle cx="420" cy="80" r="2.4" fill="#fff" opacity=".9"/>
      <text x="36" y="386" fill="#e8eaf2" font-size="42" font-weight="700" letter-spacing="6">NOVA HORIZON</text>
      <text x="38" y="414" fill="#9aa1b5" font-size="15" letter-spacing="2.5">ORIGINAL MOTION PICTURE SOUNDTRACK</text>
    </g>
  </defs>

  <!-- Backdrop: the cover, scaled up and heavily Gaussian-blurred, under a dark scrim -->
  <g clip-path="url(#frame)">
    <g transform="translate(-260,-500) scale(3.2)" filter="url(#blur)"><use href="#art"/></g>
    <rect width="1100" height="680" fill="#0b0d12" opacity=".45"/>
  </g>

  <!-- Sharp cover, left (landscape poster layout) -->
  <g filter="url(#shadow)"><rect x="90" y="115" width="450" height="450" rx="14" fill="#0c1022"/></g>
  <g clip-path="url(#coverClip)"><use href="#art" x="90" y="115"/></g>

  <!-- Info box, right -->
  <rect x="600" y="205" width="410" height="270" rx="18" fill="#0b0d12" opacity=".72"/>
  <text x="640" y="278" fill="#e8eaf2" font-size="30" font-weight="700">Nova Horizon</text>
  <text x="640" y="312" fill="#e8eaf2" font-size="21" opacity=".92">Main Theme</text>
  <text x="640" y="348" fill="#9aa1b5" font-size="16">Aria Quinn (4:07)</text>
  <text x="640" y="437" fill="#e8eaf2" font-size="44" font-weight="600" font-family="Consolas, ui-monospace, monospace">2:36</text>
</svg>
