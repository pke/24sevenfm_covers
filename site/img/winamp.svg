<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640" font-family="system-ui, 'Segoe UI', sans-serif">
  <defs>
    <!-- Original synthwave-style artwork (1980s.FM vibe), invented album -->
    <linearGradient id="wsky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#12082e"/>
      <stop offset=".55" stop-color="#3d1160"/>
      <stop offset="1" stop-color="#7a1d63"/>
    </linearGradient>
    <linearGradient id="wsun" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffd75c"/>
      <stop offset="1" stop-color="#ff5c9d"/>
    </linearGradient>
    <clipPath id="wsunclip"><circle cx="320" cy="300" r="130"/></clipPath>
  </defs>

  <rect width="640" height="640" fill="url(#wsky)"/>
  <g clip-path="url(#wsunclip)">
    <circle cx="320" cy="300" r="130" fill="url(#wsun)"/>
    <rect x="190" y="330" width="260" height="10" fill="#3d1160"/>
    <rect x="190" y="360" width="260" height="14" fill="#3d1160"/>
    <rect x="190" y="396" width="260" height="18" fill="#3d1160"/>
  </g>
  <!-- grid floor -->
  <g stroke="#ff5c9d" stroke-opacity=".55" stroke-width="2">
    <line x1="0" y1="470" x2="640" y2="470"/><line x1="0" y1="500" x2="640" y2="500"/>
    <line x1="0" y1="545" x2="640" y2="545"/><line x1="0" y1="605" x2="640" y2="605"/>
    <line x1="320" y1="450" x2="320" y2="640"/><line x1="200" y1="450" x2="80" y2="640"/>
    <line x1="440" y1="450" x2="560" y2="640"/><line x1="110" y1="450" x2="-120" y2="640"/>
    <line x1="530" y1="450" x2="760" y2="640"/>
  </g>
  <circle cx="90" cy="105" r="2.4" fill="#fff" opacity=".8"/><circle cx="545" cy="70" r="2" fill="#fff" opacity=".7"/>
  <circle cx="480" cy="150" r="1.6" fill="#fff" opacity=".6"/><circle cx="160" cy="60" r="1.8" fill="#fff" opacity=".7"/>

  <text x="320" y="90" fill="#e8eaf2" font-size="52" font-weight="700" letter-spacing="10" text-anchor="middle">MIDNIGHT</text>
  <text x="320" y="140" fill="#ffd75c" font-size="52" font-weight="700" letter-spacing="16" text-anchor="middle">ARCADE</text>

  <!-- Remaining-time pill, top-right -->
  <rect x="524" y="20" width="96" height="42" rx="21" fill="#0b0d12" opacity=".72"/>
  <text x="572" y="49" fill="#e8eaf2" font-size="24" font-weight="600" text-anchor="middle" font-family="Consolas, ui-monospace, monospace">1:58</text>
</svg>
