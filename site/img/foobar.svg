<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640" font-family="system-ui, 'Segoe UI', sans-serif">
  <defs>
    <!-- Original deep-trance artwork (Entranced.FM vibe), invented album -->
    <radialGradient id="fdeep" cx=".5" cy=".42" r=".9">
      <stop offset="0" stop-color="#0f5f6e"/>
      <stop offset=".5" stop-color="#0a3350"/>
      <stop offset="1" stop-color="#060d1e"/>
    </radialGradient>
    <radialGradient id="fglow" cx=".5" cy=".42" r=".35">
      <stop offset="0" stop-color="#7ff0e0" stop-opacity=".95"/>
      <stop offset="1" stop-color="#7ff0e0" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="640" height="640" fill="url(#fdeep)"/>
  <!-- concentric ripples -->
  <g fill="none" stroke="#7ff0e0">
    <circle cx="320" cy="270" r="60"  stroke-opacity=".9" stroke-width="2.5"/>
    <circle cx="320" cy="270" r="105" stroke-opacity=".55" stroke-width="2"/>
    <circle cx="320" cy="270" r="155" stroke-opacity=".32" stroke-width="1.8"/>
    <circle cx="320" cy="270" r="210" stroke-opacity=".18" stroke-width="1.5"/>
    <circle cx="320" cy="270" r="270" stroke-opacity=".09" stroke-width="1.2"/>
  </g>
  <circle cx="320" cy="270" r="70" fill="url(#fglow)"/>
  <circle cx="212" cy="118" r="1.9" fill="#bffcf2" opacity=".7"/><circle cx="470" cy="420" r="2.2" fill="#bffcf2" opacity=".6"/>
  <circle cx="120" cy="360" r="1.6" fill="#bffcf2" opacity=".5"/><circle cx="540" cy="140" r="1.8" fill="#bffcf2" opacity=".6"/>

  <text x="320" y="540" fill="#e8f8f4" font-size="56" font-weight="700" letter-spacing="12" text-anchor="middle">DEEP CURRENT</text>
  <text x="320" y="578" fill="#8fb4bd" font-size="19" letter-spacing="5" text-anchor="middle">A TRANCE JOURNEY</text>

  <!-- Remaining-time pill, top-right -->
  <rect x="524" y="20" width="96" height="42" rx="21" fill="#0b0d12" opacity=".72"/>
  <text x="572" y="49" fill="#e8eaf2" font-size="24" font-weight="600" text-anchor="middle" font-family="Consolas, ui-monospace, monospace">4:12</text>
</svg>
