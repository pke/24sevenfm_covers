<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640" font-family="system-ui, 'Segoe UI', sans-serif">
  <defs>
    <!-- Same fake cover art as poster.svg, filling the whole client area -->
    <linearGradient id="cover" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1b2650"/>
      <stop offset=".55" stop-color="#3b2a6e"/>
      <stop offset="1" stop-color="#0c1022"/>
    </linearGradient>
    <radialGradient id="nebula" cx=".68" cy=".3" r=".8">
      <stop offset="0" stop-color="#ff5c9d" stop-opacity=".85"/>
      <stop offset=".45" stop-color="#7c5cff" stop-opacity=".5"/>
      <stop offset="1" stop-color="#7c5cff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="planet" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#e8eaf2"/>
      <stop offset="1" stop-color="#4d5f9e"/>
    </linearGradient>
  </defs>

  <!-- Cover fills the window edge to edge -->
  <rect width="640" height="640" fill="url(#cover)"/>
  <rect width="640" height="640" fill="url(#nebula)"/>
  <circle cx="427" cy="228" r="100" fill="url(#planet)"/>
  <ellipse cx="427" cy="228" rx="168" ry="37" fill="none" stroke="#e8eaf2" stroke-opacity=".7" stroke-width="7" transform="rotate(-18 427 228)"/>
  <circle cx="125" cy="470" r="3.1" fill="#fff" opacity=".9"/><circle cx="213" cy="85" r="2.3" fill="#fff" opacity=".7"/>
  <circle cx="64" cy="171" r="2.6" fill="#fff" opacity=".8"/><circle cx="555" cy="470" r="2.4" fill="#fff" opacity=".8"/>
  <circle cx="306" cy="363" r="2" fill="#fff" opacity=".6"/><circle cx="597" cy="114" r="3.4" fill="#fff" opacity=".9"/>
  <text x="51" y="549" fill="#e8eaf2" font-size="60" font-weight="700" letter-spacing="8">NOVA HORIZON</text>
  <text x="54" y="589" fill="#9aa1b5" font-size="21" letter-spacing="3.5">ORIGINAL MOTION PICTURE SOUNDTRACK</text>

  <!-- Remaining-time pill, top-right of the client area -->
  <rect x="524" y="20" width="96" height="42" rx="21" fill="#0b0d12" opacity=".72"/>
  <text x="572" y="49" fill="#e8eaf2" font-size="24" font-weight="600" text-anchor="middle" font-family="Consolas, ui-monospace, monospace">2:36</text>
</svg>
